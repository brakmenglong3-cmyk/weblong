<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
       <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Angkor&family=Archivo+Black&family=Black+Ops+One&display=swap" rel="stylesheet">
        <link rel="stylesheet" 
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </head>
    <body class="td">
        <form>
            <fieldset>
                <table cellpadding="10px">
                   <caption>
                    <h3>
                      <i class="fa-solid fa-bed"></i>
                    ADD NEW ROOM
                    </caption>
                    </h3>
                    <tr>
                        <td>
                            <label>Room Number</label>
                        </td>
                        <td>:</td>
                        <td>
                            <input type="text" name="Heng" placeholder="type...">
                        </td>
                    </tr>
                     <tr>
                        <td>
                            <label>Room Price</label>
                        </td>
                        <td>:</td>
                        <td>
                            <input type="number" name="Hengprice" min="20">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>Room Type</label>
                        </td>
                        <td>:</td>
                        <td>
                            <select name="Hengtype">
                                <option>Single Room</option>
                                <option>Double Room</option>
                                <option>Family Room</option>
                            </select>
                        </td>
                    </tr>
                    <tr valign="top">
                        <td>
                            <label>Room Note</label>
                        </td>
                        <td>:</td>
                        <td>
                            <textarea name="Hengnote" cols="40" rows="3">
                              
                            </textarea>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>Room Status</label>
                        </td>
                        <td>:</td>
                        <td>
                              <select name="Hengstatus">
                                <option>Avilable</option>
                                <option>Maintenance</option>
                              </select>
                        </td>
                    </tr>
                    <tr valign="top">
                        <td></td>
                        <td></td>
                        <td>
                            <input type="submit" value="Insert">
                        </td>
                    </tr> 
                    <tr>
                <td colspan="3" align="center">
                    <a href="index.html" target="_parent"><button>Back</button></a>
                </td>
            </tr>
                </table>
            </fieldset>
        </form>
    </body>
</html>
