<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../style.css"
        <link rel="stylesheet" 
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </head>
    <body>

    <form>
            <fieldset>
                <table cellpadding="10" border="1">
                   <caption>
                    <h3>
                      <i class="fa-solid fa-calendar"></i> Create Booking 
                    </h3>
                         </caption>
                         <tr>
                            <td><label>Customer name</label></td>
                            <td>:</td>
                            <td><input type="taxt" placeholder="type here...">

                            </td>
                         </tr>
                         <tr>
                            <td><label>Gender</label></td>
                            <td>:</td>
                            <td>
                                <input type="radio" name="gender" value="famale">Female
                                <input type="radio" name="gemder" value="male">Male
                            </td>
                         </tr>
                         <tr>
                            <td><label>ID Card</label></td>
                            <td>:</td>
                            <td><input type="file" placeholder="type here..."></td>
                         </tr>
                         <tr>
                            <td><label>Check In</label></td>
                            <td>:</td>
                            <td><input type="data"  placeholder="type here..."></td>
                         </tr>
                         <tr>
                            <td><label>Check Out</label></td>
                            <td>:</td>
                            <td><input type="data"  placeholder="type here..."></td>
                         </tr>
                         <tr>
                            <td><label>Room Number</label></td>
                            <td>:</td>
                            <td>
                    <select name="roomNumber">
                    <optgroup label="Single room">
                        <option>101</option>
                        <option>102</option>
                        <option>103</option>
                        <option>104</option>
                    </optgroup>
                    <optgroup label="Double room">
                        <option>201</option>
                        <option>202</option>
                        <option>203</option>
                        <option>204</option>
                    </optgroup>
                    <optgroup label="Family Room">
                        <option>301</option>
                        <option>302</option>
                        <option>303</option>
                        <option>304</option>
                    </optgroup>
                    </select>  
                    
                    </td>  
                </tr>
                <tr>
                    <td>
                        <label>Note</label>
                    </td> 
                    <td>:</td>
                    <td>
                        <texarea name="note" placeholder="Type here..." row="5" cols="30"></texarea>
                    </td>     
                            </td>
                         </tr>
                         <tr>
                            <td></td>
                            <td></td>
                            <td>
                                <input type="submit" value="Create">
                                <input type="reset" value="clear">
                            </td>
                         </tr>
                </table>
            </fieldset>
    </form>
    </body>

                    
</html>
